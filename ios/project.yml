name: lingo

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "7"
    DEVELOPMENT_TEAM: QMM486NPYC

schemes:
  Lingo-iOS:
    build:
      targets:
        Lingo-iOS: all
        Lingo-iOSTests: [test]
    test:
      targets:
        - Lingo-iOSTests

targets:
  Lingo-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
      - path: Sources/Resources
    dependencies:
      - package: Supabase
        product: Supabase
      - target: LingoWidgetExtension
    entitlements:
      path: Sources/iOS/Lingo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nulljosh.lingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.lingo
        INFOPLIST_FILE: Sources/iOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/iOS/Lingo.entitlements

  LingoWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: Sources/Widget/LingoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nulljosh.lingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.lingo.widget
        INFOPLIST_FILE: Sources/Widget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/Widget/LingoWidget.entitlements

  Lingo-iOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Lingo-iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  Lingo-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/macOS
      - path: Sources/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.lingo.mac
        INFOPLIST_FILE: Sources/macOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/macOS/Lingo-macOS.entitlements
